# ============================================================
# Tice Creek Calendar Sync – Beth's Preferences
# ============================================================
# Sync: Zumba, UJAM, Aquacise (Bob only), Posture Balance
#        Core & Strength, Mat Yoga
# Only sync: classes at 11am or later
# ============================================================

calendar_name: "Tice Creek – Beth's Classes"

# Class types to include (case-insensitive, partial match)
# Use a string for any instructor, or {name: ..., instructor: ...} to filter
include_classes:
  - "zumba"
  - "ujam"
  - name: "aquacise"
    instructor: "bob"
  - "posture_balance_core"
  - "mat_yoga"

# Classes to exclude
exclude_classes:
  - "cancelled"

# Only show classes at 11am or later
earliest_hour: 11

# Start events 15 min early so Beth has travel time
# (real class time still shown in the event description)
early_start_minutes: 15

# Custom display names (matched by class name + instructor)
# Format: { match_name: "...", match_instructor: "...", title: "..." }
custom_titles:
  - match_name: "zumba"
    match_instructor: "sabrina"
    title: "Zumba w/ Sabrina"
  - match_name: "aquacise"
    match_instructor: "bob"
    title: "Aquacise w/ Bob"

# Default class duration if end time isn't scraped (minutes)
default_class_duration_minutes: 45

# --- Rossmoor Entertainment Settings ---
# Scrape the Peacock Hall movie & concert calendar from rossmoor.com
include_movies: true
include_concerts: true

# Only include showings/concerts at or after this hour (18 = 6 PM)
movie_earliest_hour: 18

# Default movie duration in minutes (most are ~2 hours)
movie_duration_minutes: 135

# Default concert duration in minutes
concert_duration_minutes: 120

# --- Output Settings ---
# Two separate ICS files so each can be colored independently:
#   fitness  = classes (green recommended)
#   entertainment = movies + concerts (purple recommended)
# Beth's personal calendar (medical, appointments) keeps its own color.
output_dir: "docs"
fitness_filename: "tice-creek-fitness.ics"
entertainment_filename: "tice-creek-entertainment.ics"
